# Agent pushes per-agent Prometheus metrics (agent_job_run_total{status}, agent_job_last_run_timestamp_seconds{status}, agent_job_duration_seconds) to PushGateway at Job end.
# Envs (defaulted in main.go struct tags, no manifest change needed for cluster deploy):
#   PUSHGATEWAY_URL  default "http://pushgateway:9090" — cluster-internal address resolves automatically.
#   TASK_TYPE        default "unknown" — executor-side population is a follow-up; metrics carry task_type="unknown" until then.
apiVersion: agent.benjamin-borbe.de/v1
kind: Config
metadata:
  name: agent-sentry-issue-analyzer
  namespace: '{{ "NAMESPACE" | env }}'
spec:
  assignee: claude-agent
  taskTypes:
    - llm
    - healthcheck
  priorityClassName: agent-sentry-issue-analyzer
  image: docker.quant.benjamin-borbe.de:443/agent-sentry-issue-analyzer
  heartbeat: 5m
  secretName: agent-sentry-issue-analyzer
  volumeClaim: agent-sentry-issue-analyzer
  volumeMountPath: /home/claude/.claude
  env:
    ALLOWED_TOOLS: WebSearch,WebFetch,Read,Grep
    ANTHROPIC_BASE_URL: https://api.minimax.io/anthropic
    ANTHROPIC_MODEL: MiniMax-M2.7-highspeed
  trigger:
    phases:
      - planning
      - execution
      - ai_review
    statuses:
      - in_progress
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
      ephemeral-storage: 2Gi
    limits:
      cpu: 500m
      memory: 1Gi
      ephemeral-storage: 2Gi
